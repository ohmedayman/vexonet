<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 | الصفحة غير موجودة - Vexonet</title>
    <link rel="icon" type="image/png" href="https://6a2198dd66b5d7d9ebc78bf6.imgix.net/default.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e9ecef;
            padding: 0 24px;
        }

        .nav-inner {
            max-width: 1140px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 42px;
            width: auto;
        }

        /* 404 Content */
        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }

        .error-content {
            max-width: 500px;
        }

        .error-code {
            font-size: 160px;
            font-weight: 900;
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .error-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #1a1a2e;
        }

        .error-desc {
            font-size: 16px;
            color: #495057;
            margin-bottom: 36px;
            line-height: 1.7;
        }

        .error-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4f46e5;
            color: #fff;
        }

        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(79, 70, 229, 0.2);
        }

        .btn-outline {
            background: transparent;
            color: #1a1a2e;
            border: 2px solid #e9ecef;
        }

        .btn-outline:hover {
            border-color: #4f46e5;
            color: #4f46e5;
            background: #eef2ff;
            transform: translateY(-2px);
        }

        /* Footer */
        .footer-mini {
            padding: 24px;
            text-align: center;
            border-top: 1px solid #e9ecef;
            color: #868e96;
            font-size: 14px;
        }

        .footer-mini a {
            color: #4f46e5;
            text-decoration: none;
        }

        .footer-mini a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .error-code {
                font-size: 100px;
            }

            .error-title {
                font-size: 22px;
            }

            .error-btns {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <img src="https://6a2198dd66b5d7d9ebc78bf6.imgix.net/default.png" alt="Vexonet" class="logo-img">
            </a>
        </div>
    </nav>

    <!-- 404 Content -->
    <div class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">الصفحة غير موجودة</h1>
            <p class="error-desc">يبدو أن الصفحة التي تبحث عنها لم تعد متاحة أو تم نقلها إلى عنوان آخر.</p>
            <div class="error-btns">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    العودة للرئيسية
                </a>
                <a href="#contact" class="btn btn-outline">
                    <i class="fas fa-envelope"></i>
                    تواصل معنا
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-mini">
        <p>&copy; 2026 <a href="index.html">Vexonet</a>. كل الحقوق محفوظة.</p>
    </div>

    <script>
        // Update contact link
        document.querySelector('.btn-outline').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'index.html#contact';
        });
    </script>
</body>
</html>
